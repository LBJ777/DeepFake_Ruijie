project: FreqPRISM
seed: 100

dataset:
  source_train_root: /data/lizihao/AIGC/AIGCDetectBenchmark-main/dataset/train_100k/progan_train
  target_test_root: /data/lizihao/AIGC/AIGCDetectBenchmark-main/dataset/test/test

artifacts:
  artifact_model: checkpoints/artifact_prior/artifact_prior_models.joblib
  semantic_probe: checkpoints/semantic_prior/semantic_probe.joblib
  residual_prior: checkpoints/residual_prior/checkpoint-1.pth

artifact_prior:
  image_size: 256
  train_per_label: 0
  train_variants:
    - clean
    - jpeg50
    - jpeg50
    - resize50
    - blur1
  eval_variants:
    - clean
    - jpeg35
    - jpeg50
    - resize50
    - blur1
  chroma_alpha: -0.40
  codec_max_iter: 200

semantic_prior:
  model_name: ViT-L/14
  download_root: /data/lizihao/.cache/clip
  image_size: 256
  train_per_label: 0
  holdout_per_label: 0
  train_variants:
    - clean
  holdout_variants:
    - clean
  eval_variants:
    - clean
  linear_c: 1.0

residual_prior:
  train_image_size: 256
  inference_image_size: null
  selected_epoch: 1
  epochs: 2
  max_samples_per_label: 0
  random_state: 100
  lr: 0.0002
  weight_decay: 0.0

composition:
  tile_mode: top1
  tile_size: 256
  tile_grid_size: 3
  beta: 0.20
  alpha_low_pos: 0.15
  alpha_low_neg: 0.15
  alpha_high_pos: 0.20
  alpha_high_neg: 0.00
  alpha_high_neg_guard: 0.20
  tile_delta_threshold: 0.00
  high_res_threshold: 960.0
  gamma: 0.08
  threshold: 0.50

selection:
  source_only: true
  gamma_grid: [0.05, 0.08, 0.10, 0.12]
  beta_grid: [0.15, 0.20, 0.25]
  alpha_grid: [0.10, 0.15, 0.20]
  target_labels_used: false

evaluation:
  per_label: 0
  full_target: true

runtime:
  artifact_batch_size: 64
  semantic_batch_size: 32
  residual_batch_size: 32
  residual_eval_batch_size: 64
  artifact_forward_batch_size: 64
  num_workers: 4
